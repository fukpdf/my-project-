<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confirm your account — ILovePDF</title>
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/home.css">
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <a href="/" class="brand" aria-label="ILovePDF home">
        <span class="brand-mark"><i data-lucide="file-text"></i></span>
        <span class="brand-name">ILove<span>PDF</span></span>
      </a>
      <nav class="nav" id="nav" aria-label="Main"></nav>
      <div class="header-cta">
        <a href="/" class="btn btn-ghost">Home</a>
        <button class="hamburger" id="hamburger" aria-label="Open menu">
          <i data-lucide="menu"></i>
        </button>
      </div>
    </div>
  </header>

  <div class="drawer" id="drawer" aria-hidden="true">
    <div class="drawer-back"></div>
    <div class="drawer-panel"></div>
  </div>

  <main class="verify-page">
    <div class="verify-card" id="verify-card">
      <div class="verify-loading" id="verify-loading">
        <i data-lucide="loader-2"></i>
        <p>Validating your confirmation link…</p>
      </div>

      <div class="verify-error" id="verify-error" hidden>
        <span class="verify-emoji">⚠️</span>
        <h2>Link Invalid or Expired</h2>
        <p id="verify-error-msg">This confirmation link is no longer valid.</p>
        <a href="/" class="auth-submit" style="display:inline-block;text-decoration:none;text-align:center;max-width:240px;margin-top:12px;">Back to homepage</a>
      </div>

      <form class="verify-form" id="verify-form" hidden>
        <div class="verify-icon"><i data-lucide="shield-check"></i></div>
        <h2>Email Confirmed</h2>
        <p class="verify-sub">Welcome to ILovePDF! Finish setting up your account for <strong id="verify-email"></strong>.</p>

        <div class="vf-row">
          <label class="auth-field">
            <span>First name</span>
            <input type="text" id="vf-first" name="firstName" required autocomplete="given-name">
          </label>
          <label class="auth-field">
            <span>Last name</span>
            <input type="text" id="vf-last" name="lastName" required autocomplete="family-name">
          </label>
        </div>

        <label class="auth-field">
          <span>Password (at least 6 characters)</span>
          <input type="password" id="vf-pwd" name="password" required minlength="6" autocomplete="new-password">
        </label>

        <label class="auth-field pwd-confirm">
          <span>Confirm password <span class="pwd-icon" id="pwd-icon"></span></span>
          <input type="password" id="vf-pwd2" name="confirmPassword" required minlength="6" autocomplete="new-password">
          <span class="pwd-hint" id="pwd-hint"></span>
        </label>

        <button type="submit" class="auth-submit" id="vf-submit" disabled>Create my account</button>
        <div class="auth-msg" id="vf-msg"></div>
      </form>
    </div>
  </main>

  <footer class="footer">
    <div class="footer-inner">
      <div class="footer-col footer-brand">
        <a href="/" class="brand"><span class="brand-mark"><i data-lucide="file-text"></i></span>
        <span class="brand-name">ILove<span>PDF</span></span></a>
        <p>Free PDF &amp; Image tools online.</p>
      </div>
    </div>
    <div class="footer-bottom">
      <span>© 2026 ILovePDF — All rights reserved.</span>
    </div>
  </footer>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="/js/chrome.js"></script>
  <script>
  (function(){
    const params = new URLSearchParams(location.search);
    const token  = params.get('token') || '';
    const $ = id => document.getElementById(id);
    const showError = (msg) => {
      $('verify-loading').hidden = true;
      $('verify-error-msg').textContent = msg;
      $('verify-error').hidden = false;
    };
    const showForm  = (email) => {
      $('verify-loading').hidden = true;
      $('verify-email').textContent = email;
      $('verify-form').hidden = false;
      window.lucide && window.lucide.createIcons && window.lucide.createIcons();
    };

    if (!token) { showError('No confirmation token in the URL.'); return; }

    fetch('/api/auth/verify-token?token=' + encodeURIComponent(token))
      .then(r => r.json().then(d => ({ ok: r.ok, d })))
      .then(({ ok, d }) => ok ? showForm(d.email) : showError(d.error || 'Invalid link.'))
      .catch(() => showError('Network error — please try again.'));

    const pwd  = $('vf-pwd');
    const pwd2 = $('vf-pwd2');
    const icon = $('pwd-icon');
    const hint = $('pwd-hint');
    const submit = $('vf-submit');

    function checkPwd(){
      const a = pwd.value, b = pwd2.value;
      const long = a.length >= 6;
      pwd.classList.toggle('field-bad',  a && !long);
      pwd.classList.toggle('field-good', long);
      if (!b) { icon.innerHTML = ''; hint.textContent = ''; submit.disabled = true; submit.classList.remove('ok'); pwd2.classList.remove('field-bad','field-good'); return; }
      if (a === b && long) {
        icon.innerHTML = '<i data-lucide="check-circle-2"></i>';
        hint.textContent = 'Passwords match.';
        hint.className = 'pwd-hint ok';
        pwd2.classList.add('field-good'); pwd2.classList.remove('field-bad');
        submit.disabled = false; submit.classList.add('ok');
      } else {
        icon.innerHTML = '<i data-lucide="x-circle"></i>';
        hint.textContent = long ? 'Passwords do not match.' : 'Password must be at least 6 characters.';
        hint.className = 'pwd-hint bad';
        pwd2.classList.add('field-bad'); pwd2.classList.remove('field-good');
        submit.disabled = true; submit.classList.remove('ok');
      }
      window.lucide && window.lucide.createIcons && window.lucide.createIcons();
    }
    pwd.addEventListener('input', checkPwd);
    pwd2.addEventListener('input', checkPwd);

    $('verify-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const msg = $('vf-msg'); msg.className = 'auth-msg'; msg.textContent = '';
      submit.disabled = true; submit.textContent = 'Creating account…';
      try {
        const r = await fetch('/api/auth/complete-signup', {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify({
            token,
            firstName: $('vf-first').value.trim(),
            lastName:  $('vf-last').value.trim(),
            password:  pwd.value,
            confirmPassword: pwd2.value,
          })
        });
        const d = await r.json();
        if (!r.ok) throw new Error(d.error || 'Signup failed.');
        msg.className = 'auth-msg success';
        msg.textContent = 'Account created! Logging you in…';
        setTimeout(() => location.href = '/', 800);
      } catch (err) {
        msg.className = 'auth-msg bad';
        msg.textContent = err.message;
        submit.disabled = false; submit.textContent = 'Create my account';
      }
    });
  })();
  </script>
</body>
</html>
