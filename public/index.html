<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF Tools Pro — 29 Professional PDF Tools</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="app-layout">

    <div class="sidebar-overlay hidden" id="sidebar-overlay"></div>
    <aside id="sidebar-container" class="sidebar"></aside>

    <div class="main-content">
      <header class="topbar">
        <button class="menu-toggle" id="menu-toggle" aria-label="Open menu">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <span class="topbar-title">PDF Tools Pro</span>
        <span class="topbar-sub">All Tools</span>
        <div class="topbar-right">
          <div class="topbar-search">
            <i data-lucide="search"></i>
            <input type="text" id="search-input" placeholder="Search tools...">
          </div>
        </div>
      </header>

      <main class="dashboard">
        <div class="hero">
          <div class="hero-title">Every PDF Tool You'll Ever Need</div>
          <div class="hero-sub">29 professional tools to edit, convert, compress, and manage your PDF files — fast and free.</div>
          <div class="hero-chips">
            <span class="hero-chip">Merge &amp; Split</span>
            <span class="hero-chip">Compress</span>
            <span class="hero-chip">Convert</span>
            <span class="hero-chip">Edit &amp; Sign</span>
            <span class="hero-chip">Protect</span>
            <span class="hero-chip">AI Tools</span>
          </div>
        </div>

        <div id="dashboard-content"></div>
      </main>
    </div>
  </div>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="js/tools-config.js"></script>
  <script src="js/sidebar.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
